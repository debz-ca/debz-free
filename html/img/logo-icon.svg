<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-lg" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="dots" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="6" cy="6" r="0.7" fill="#2dd4bf" opacity="0.15"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" fill="#0d1117"/>

  <!-- Outer hex -->
  <polygon points="100,4 188,52 188,148 100,196 12,148 12,52"
           fill="#0d1117" stroke="#2dd4bf" stroke-width="2" opacity="0.8"/>

  <!-- Matrix dot fill -->
  <polygon points="100,4 188,52 188,148 100,196 12,148 12,52"
           fill="url(#dots)"/>

  <!-- Inner hex ring -->
  <polygon points="100,22 170,62 170,138 100,178 30,138 30,62"
           fill="none" stroke="#2dd4bf" stroke-width="0.8" opacity="0.18"/>

  <!-- Root node — rpool -->
  <circle cx="100" cy="46" r="14" fill="#0d1117" stroke="#2dd4bf" stroke-width="2" filter="url(#glow-lg)"/>
  <circle cx="100" cy="46" r="7"  fill="#2dd4bf" filter="url(#glow-lg)"/>

  <!-- Mid nodes -->
  <circle cx="52"  cy="95"  r="10" fill="#0d1117" stroke="#2dd4bf" stroke-width="1.6"/>
  <circle cx="52"  cy="95"  r="5"  fill="#2dd4bf" opacity="0.9" filter="url(#glow)"/>

  <circle cx="100" cy="108" r="10" fill="#0d1117" stroke="#2dd4bf" stroke-width="1.6"/>
  <circle cx="100" cy="108" r="5"  fill="#2dd4bf" opacity="0.9" filter="url(#glow)"/>

  <circle cx="148" cy="95"  r="10" fill="#0d1117" stroke="#2dd4bf" stroke-width="1.6"/>
  <circle cx="148" cy="95"  r="5"  fill="#2dd4bf" opacity="0.9" filter="url(#glow)"/>

  <!-- Leaf nodes -->
  <circle cx="44"  cy="150" r="7"  fill="#0d1117" stroke="#2dd4bf" stroke-width="1.2"/>
  <circle cx="44"  cy="150" r="3.5" fill="#2dd4bf" opacity="0.65" filter="url(#glow)"/>

  <circle cx="100" cy="158" r="7"  fill="#0d1117" stroke="#2dd4bf" stroke-width="1.2"/>
  <circle cx="100" cy="158" r="3.5" fill="#2dd4bf" opacity="0.65" filter="url(#glow)"/>

  <circle cx="156" cy="150" r="7"  fill="#0d1117" stroke="#2dd4bf" stroke-width="1.2"/>
  <circle cx="156" cy="150" r="3.5" fill="#2dd4bf" opacity="0.65" filter="url(#glow)"/>

  <!-- Root → mid -->
  <line x1="100" y1="58"  x2="58"  y2="87"  stroke="#2dd4bf" stroke-width="1.8" opacity="0.55"/>
  <line x1="100" y1="58"  x2="100" y2="98"  stroke="#2dd4bf" stroke-width="1.8" opacity="0.55"/>
  <line x1="100" y1="58"  x2="142" y2="87"  stroke="#2dd4bf" stroke-width="1.8" opacity="0.55"/>

  <!-- Mid → leaf -->
  <line x1="52"  y1="104" x2="46"  y2="143" stroke="#2dd4bf" stroke-width="1.3" opacity="0.42"/>
  <line x1="52"  y1="104" x2="96"  y2="151" stroke="#2dd4bf" stroke-width="1.3" opacity="0.42"/>
  <line x1="148" y1="104" x2="104" y2="151" stroke="#2dd4bf" stroke-width="1.3" opacity="0.42"/>
  <line x1="148" y1="104" x2="154" y2="143" stroke="#2dd4bf" stroke-width="1.3" opacity="0.42"/>

  <!-- Mesh cross-links -->
  <line x1="52"  y1="95"  x2="100" y2="108" stroke="#2dd4bf" stroke-width="0.9" opacity="0.28"/>
  <line x1="148" y1="95"  x2="100" y2="108" stroke="#2dd4bf" stroke-width="0.9" opacity="0.28"/>
  <line x1="44"  y1="150" x2="100" y2="158" stroke="#2dd4bf" stroke-width="0.7" opacity="0.22" stroke-dasharray="4,3"/>
  <line x1="100" y1="158" x2="156" y2="150" stroke="#2dd4bf" stroke-width="0.7" opacity="0.22" stroke-dasharray="4,3"/>
  <line x1="44"  y1="150" x2="156" y2="150" stroke="#2dd4bf" stroke-width="0.6" opacity="0.15" stroke-dasharray="3,4"/>
</svg>
