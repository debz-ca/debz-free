<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 40">
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-lg" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="dots" width="8" height="8" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="0.4" fill="#2dd4bf" opacity="0.18"/>
    </pattern>
  </defs>

  <!-- === ICON MARK (0–40) === -->

  <!-- Hex frame -->
  <polygon points="20,1 37,10.5 37,29.5 20,39 3,29.5 3,10.5"
           fill="#0d1117" stroke="#2dd4bf" stroke-width="1.2" opacity="0.85"/>

  <!-- Matrix dot fill inside hex -->
  <polygon points="20,1 37,10.5 37,29.5 20,39 3,29.5 3,10.5"
           fill="url(#dots)"/>

  <!-- Inner hex ring (faint) -->
  <polygon points="20,6 32,13 32,27 20,34 8,27 8,13"
           fill="none" stroke="#2dd4bf" stroke-width="0.4" opacity="0.2"/>

  <!-- Root node — rpool -->
  <circle cx="20" cy="10" r="3.8" fill="#0d1117" stroke="#2dd4bf" stroke-width="1.2" filter="url(#glow-lg)"/>
  <circle cx="20" cy="10" r="2"   fill="#2dd4bf" filter="url(#glow-lg)"/>

  <!-- Mid-level nodes -->
  <circle cx="10" cy="21" r="2.8" fill="#0d1117" stroke="#2dd4bf" stroke-width="1"/>
  <circle cx="10" cy="21" r="1.4" fill="#2dd4bf" opacity="0.85" filter="url(#glow)"/>

  <circle cx="20" cy="24" r="2.8" fill="#0d1117" stroke="#2dd4bf" stroke-width="1"/>
  <circle cx="20" cy="24" r="1.4" fill="#2dd4bf" opacity="0.85" filter="url(#glow)"/>

  <circle cx="30" cy="21" r="2.8" fill="#0d1117" stroke="#2dd4bf" stroke-width="1"/>
  <circle cx="30" cy="21" r="1.4" fill="#2dd4bf" opacity="0.85" filter="url(#glow)"/>

  <!-- Leaf nodes -->
  <circle cx="10" cy="32" r="2"   fill="#0d1117" stroke="#2dd4bf" stroke-width="0.8"/>
  <circle cx="10" cy="32" r="1"   fill="#2dd4bf" opacity="0.6"/>

  <circle cx="30" cy="32" r="2"   fill="#0d1117" stroke="#2dd4bf" stroke-width="0.8"/>
  <circle cx="30" cy="32" r="1"   fill="#2dd4bf" opacity="0.6"/>

  <!-- Tree connections root→mid -->
  <line x1="20" y1="12" x2="11"  y2="19" stroke="#2dd4bf" stroke-width="1.1" opacity="0.55"/>
  <line x1="20" y1="12" x2="20"  y2="21" stroke="#2dd4bf" stroke-width="1.1" opacity="0.55"/>
  <line x1="20" y1="12" x2="29"  y2="19" stroke="#2dd4bf" stroke-width="1.1" opacity="0.55"/>

  <!-- mid→leaf -->
  <line x1="10" y1="24" x2="10"  y2="30" stroke="#2dd4bf" stroke-width="0.9" opacity="0.4"/>
  <line x1="30" y1="24" x2="30"  y2="30" stroke="#2dd4bf" stroke-width="0.9" opacity="0.4"/>

  <!-- Mesh cross-links -->
  <line x1="10" y1="21" x2="20"  y2="24" stroke="#2dd4bf" stroke-width="0.6" opacity="0.28"/>
  <line x1="30" y1="21" x2="20"  y2="24" stroke="#2dd4bf" stroke-width="0.6" opacity="0.28"/>
  <line x1="10" y1="32" x2="30"  y2="32" stroke="#2dd4bf" stroke-width="0.5" opacity="0.2" stroke-dasharray="2,2"/>

  <!-- === WORDMARK (50–160) === -->

  <!-- "debz" text -->
  <text x="50" y="27"
        font-family="'Courier New', Courier, monospace"
        font-size="22"
        font-weight="700"
        letter-spacing="3"
        fill="#e2e8f0"
        filter="url(#glow)">deb<tspan fill="#2dd4bf" filter="url(#glow-lg)">z</tspan></text>
</svg>
