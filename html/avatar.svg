<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%"   stop-color="#0e1e3a"/>
      <stop offset="100%" stop-color="#060d1c"/>
    </radialGradient>
    <linearGradient id="streamGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#7ecbff"/>
      <stop offset="50%"  stop-color="#4aa8e8"/>
      <stop offset="100%" stop-color="#2a7fc4"/>
    </linearGradient>
    <linearGradient id="poolTop" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#5ab4f0"/>
      <stop offset="100%" stop-color="#7ecbff"/>
    </linearGradient>
    <linearGradient id="poolBot" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#7ecbff"/>
      <stop offset="100%" stop-color="#5ab4f0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#7ecbff" opacity="0.8"/>
    </marker>
    <clipPath id="circle">
      <circle cx="250" cy="250" r="242"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <circle cx="250" cy="250" r="250" fill="url(#bg)"/>

  <g clip-path="url(#circle)">

    <!-- ═══ Z TOP BAR — source pool (dataset stack) ═══ -->
    <!-- Main bar -->
    <rect x="82" y="118" width="264" height="26" rx="4" fill="url(#poolTop)" opacity="0.9" filter="url(#glow)"/>
    <!-- Dataset layer ticks — suggesting snapshot stack -->
    <rect x="82"  y="152" width="264" height="5" rx="2" fill="#7ecbff" opacity="0.25"/>
    <rect x="82"  y="163" width="220" height="4" rx="2" fill="#7ecbff" opacity="0.18"/>
    <rect x="82"  y="172" width="170" height="3" rx="2" fill="#7ecbff" opacity="0.12"/>
    <!-- Source label dots (pool indicator) -->
    <circle cx="98"  cy="131" r="4" fill="#060d1c" opacity="0.6"/>
    <circle cx="112" cy="131" r="4" fill="#060d1c" opacity="0.6"/>
    <circle cx="126" cy="131" r="4" fill="#060d1c" opacity="0.6"/>

    <!-- ═══ Z DIAGONAL — the replication stream ═══ -->
    <!-- Ghost path first for glow -->
    <line x1="346" y1="144" x2="154" y2="356"
          stroke="#7ecbff" stroke-width="18" stroke-linecap="round" opacity="0.06"/>
    <!-- Main stream line -->
    <line x1="346" y1="144" x2="154" y2="356"
          stroke="url(#streamGrad)" stroke-width="3.5"
          stroke-linecap="round" stroke-dasharray="6,5"
          marker-end="url(#arrow)" opacity="0.9"/>
    <!-- Data particles along the stream -->
    <circle cx="318" cy="172" r="3.5" fill="#7ecbff" opacity="0.9" filter="url(#glow)"/>
    <circle cx="290" cy="200" r="2.5" fill="#7ecbff" opacity="0.7"/>
    <circle cx="262" cy="228" r="4"   fill="#a0d8ff" opacity="0.95" filter="url(#glow)"/>
    <circle cx="234" cy="256" r="2.5" fill="#7ecbff" opacity="0.7"/>
    <circle cx="206" cy="284" r="3.5" fill="#7ecbff" opacity="0.9" filter="url(#glow)"/>
    <circle cx="178" cy="312" r="2.5" fill="#7ecbff" opacity="0.6"/>

    <!-- ═══ Z BOTTOM BAR — destination pool ═══ -->
    <!-- Dataset layer ticks above bar (received snapshots) -->
    <rect x="154" y="320" width="170" height="3" rx="2" fill="#7ecbff" opacity="0.12"/>
    <rect x="154" y="329" width="220" height="4" rx="2" fill="#7ecbff" opacity="0.18"/>
    <rect x="154" y="338" width="264" height="5" rx="2" fill="#7ecbff" opacity="0.25"/>
    <!-- Main bar -->
    <rect x="154" y="356" width="264" height="26" rx="4" fill="url(#poolBot)" opacity="0.9" filter="url(#glow)"/>
    <!-- Destination indicator dots -->
    <circle cx="376" cy="369" r="4" fill="#060d1c" opacity="0.6"/>
    <circle cx="362" cy="369" r="4" fill="#060d1c" opacity="0.6"/>
    <circle cx="348" cy="369" r="4" fill="#060d1c" opacity="0.6"/>

    <!-- ═══ Slogan ═══ -->
    <text x="250" y="440"
          font-family="'Arial', 'Helvetica Neue', sans-serif"
          font-weight="300"
          font-size="13"
          text-anchor="middle"
          fill="#7ecbff"
          opacity="0.35"
          letter-spacing="3">ANY SILICON. ANYWHERE. ONE PLATFORM.</text>

  </g>

  <!-- Outer rim -->
  <circle cx="250" cy="250" r="245" fill="none" stroke="#7ecbff" stroke-width="1" opacity="0.08"/>
</svg>
