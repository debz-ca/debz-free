---
- name: Install KVM/libvirt packages
  apt:
    name:
      - qemu-kvm
      - libvirt-daemon-system
      - libvirt-clients
      - bridge-utils
      - virt-top
      - cpu-checker
      - libguestfs-tools
      - virtinst
      - ovmf
      - ipxe-qemu
    state: present
  retries: 3
  delay: 10

- name: Enable IP forwarding
  sysctl:
    name: net.ipv4.ip_forward
    value: "1"
    sysctl_file: /etc/sysctl.d/99-debz-kvm.conf
    reload: true

- name: Enable and start libvirtd
  systemd:
    name: libvirtd
    enabled: true
    state: started

- name: Create ZFS VM pool dataset
  command: zfs create -o mountpoint=/var/lib/vms rpool/vms
  args:
    creates: /var/lib/vms
  when: ansible_zfs_datasets is defined or true
  failed_when: false

- name: Define libvirt ZFS storage pool
  command: >
    virsh pool-define-as vms-zfs dir --target /var/lib/vms
  failed_when: false
  changed_when: false

- name: Autostart and start libvirt pool
  command: "{{ item }}"
  loop:
    - virsh pool-autostart vms-zfs
    - virsh pool-start vms-zfs
  failed_when: false
  changed_when: false
