---
- name: Wait for apt/dpkg lock
  shell: |
    while fuser /var/lib/dpkg/lock-frontend /var/lib/apt/lists/lock >/dev/null 2>&1; do
      sleep 2
    done
  changed_when: false
  timeout: 120

- name: Install baseline packages
  apt:
    name:
      - curl
      - ca-certificates
      - gpg
      - jq
      - iproute2
      - nftables
      - socat
      - conntrack
      - ethtool
      - htop
      - vim
      - tmux
      - wireguard-tools
      - chrony
      - python3
      - python3-pip
    state: present
    update_cache: true
  retries: 3
  delay: 10

- name: Ensure chrony running
  systemd:
    name: chrony
    enabled: true
    state: started

- name: Set hostname
  hostname:
    name: "{{ inventory_hostname }}"

- name: Ensure /etc/debz exists
  file:
    path: /etc/debz
    state: directory
    mode: "0755"

- name: Ansible user — NOPASSWD sudo
  copy:
    dest: /etc/sudoers.d/90-ansible
    content: "ansible ALL=(ALL) NOPASSWD:ALL\n"
    mode: "0440"
    validate: visudo -cf %s
