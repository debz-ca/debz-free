---
# debz cluster — master playbook
# Run from the Cluster Manager: ansible-playbook /srv/ansible/site.yml
# Or via the web UI Ansible panel.
#
# Inventory is auto-generated at /etc/debz/inventory by debz-reconcile.
# Add nodes via the CM web UI "Add Node" flow, then run this playbook.

- name: "00 · Preflight — bootstrap Python on all nodes"
  hosts: all_nodes
  gather_facts: false
  become: true
  tasks:
    - name: Bootstrap python3
      raw: |
        if ! command -v python3 >/dev/null 2>&1; then
          apt-get update -qq && apt-get install -y python3
        fi
      changed_when: false

- name: "01 · Common baseline"
  hosts: all_nodes
  become: true
  roles:
    - common

- name: "02 · KVM hypervisor setup"
  hosts: kvm
  become: true
  roles:
    - kvm_node

- name: "03 · Proxmox VE setup"
  hosts: proxmox
  become: true
  roles:
    - proxmox_node

- name: "04 · Firecracker microVMs"
  hosts: kvm
  become: true
  roles:
    - firecracker

- name: "05 · containerd runtime (k8s nodes)"
  hosts: etcd,worker,k8s_control
  become: true
  roles:
    - containerd

- name: "06 · Kubernetes packages"
  hosts: worker,k8s_control
  become: true
  roles:
    - k8s_pkgs

- name: "07 · etcd cluster"
  hosts: etcd
  become: true
  roles:
    - etcd_cluster

- name: "08 · HAProxy load balancer"
  hosts: lb
  become: true
  roles:
    - lb_haproxy

- name: "09 · Kubernetes control plane init"
  hosts: k8s_control
  become: true
  roles:
    - kubeadm_init
  run_once: true

- name: "10 · Join additional control planes"
  hosts: k8s_control
  become: true
  roles:
    - kubeadm_join_cp

- name: "11 · Join worker nodes"
  hosts: worker
  become: true
  roles:
    - kubeadm_join_worker

- name: "12 · Cilium CNI"
  hosts: k8s_control[0]
  become: true
  roles:
    - cilium

- name: "13 · Verify cluster"
  hosts: k8s_control[0]
  become: true
  tasks:
    - name: Get nodes
      command: kubectl get nodes -o wide
      register: nodes_out
      changed_when: false
    - debug: var=nodes_out.stdout_lines
    - name: Get pods
      command: kubectl get pods -A --field-selector=status.phase!=Running
      register: pods_out
      changed_when: false
      failed_when: false
    - debug: var=pods_out.stdout_lines
