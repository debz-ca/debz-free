# debz performance tuning

# ── Memory ────────────────────────────────────────────────────────────────────
# ZFS has its own ARC cache; keep kernel out of swap until 90% RAM used
vm.swappiness=10

# Reduce write-back burst size — smoother ZFS TXG commits
vm.dirty_ratio=15
vm.dirty_background_ratio=5

# ── Filesystem ────────────────────────────────────────────────────────────────
# Many tools (Firefox, editors, build systems) hit the default 8192 limit
fs.inotify.max_user_watches=524288
fs.inotify.max_user_instances=512

# ── Network ───────────────────────────────────────────────────────────────────
# Larger socket buffers — benefits WireGuard and high-throughput transfers
net.core.rmem_max=16777216
net.core.wmem_max=16777216
net.core.rmem_default=262144
net.core.wmem_default=262144
net.ipv4.tcp_rmem=4096 262144 16777216
net.ipv4.tcp_wmem=4096 262144 16777216

# Reduce SYN backlog drop risk on busy nodes
net.core.netdev_max_backlog=5000
net.ipv4.tcp_max_syn_backlog=4096
