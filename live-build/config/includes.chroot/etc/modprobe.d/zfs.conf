# ZFS ARC memory cap — prevent ZFS from consuming all available RAM.
# Without this, ARC grows to ~50% of physical RAM which is fine on dedicated
# storage nodes but too aggressive on desktops and mixed-use VMs.
#
# Cap at 4 GB (4294967296 bytes). On systems with <= 8 GB RAM this leaves
# at least half for applications. Raise on dedicated storage nodes.
options zfs zfs_arc_max=4294967296

# Reduce TXG commit interval from 10s to 5s for faster fsync on desktop
options zfs zfs_txg_timeout=5
