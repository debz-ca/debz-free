set -g mouse on
setw -g mode-keys vi
set -g history-limit 100000
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Splits
unbind '"'
unbind %
bind | split-window -h
bind - split-window -v

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Reloaded!"

# Vi copy mode
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel

# Status bar
set -g status-style 'bg=#1a1f2b fg=#64b5f6'
set -g status-left '#[fg=#34d399,bold] debz #[fg=#64b5f6]#S '
set -g status-right '#[fg=#94a3b8]%H:%M  #[fg=#34d399]#H'
set -g window-status-current-style 'fg=#2dd4bf,bold'
