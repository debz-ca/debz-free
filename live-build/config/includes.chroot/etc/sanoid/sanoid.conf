# debz sanoid.conf
# Scheduled snapshots for all persistent datasets.
# APT pre/post snapshots are handled separately by APT hooks.

[rpool/ROOT]
use_template = bootenv
recursive = yes

[rpool/home]
use_template = data
recursive = yes

[rpool/var/lib]
use_template = data
recursive = yes

[rpool/srv]
use_template = data
recursive = yes

[rpool/root]
use_template = data
recursive = no

# Boot environments — daily + weekly, no hourly churn on /
[template_bootenv]
frequently = 0
hourly     = 0
daily      = 7
weekly     = 12
monthly    = 12
yearly     = 0
autosnap   = yes
autoprune  = yes

# Data datasets — full retention ladder:
#   daily=7    → 1 week of dailies
#   weekly=12  → 12 weeks (covers 2-week, 3-week marks)
#   monthly=12 → 12 months (covers 3-month, 6-month, 12-month marks)
#   yearly=1   → 1 year anchor
[template_data]
frequently = 0
hourly     = 0
daily      = 7
weekly     = 12
monthly    = 12
yearly     = 1
autosnap   = yes
autoprune  = yes
