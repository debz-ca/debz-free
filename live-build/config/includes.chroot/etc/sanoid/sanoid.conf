# Debz sanoid.conf
# APT snapshots are managed by APT hooks, not sanoid.
# Sanoid manages /srv workload snapshots as a supplementary approach.
# Snapshot counts match: 4 for srv (matching snapshot-create.sh KEEP=4).

[rpool/ROOT/default]
use_template = production
recursive = no

[rpool/srv]
use_template = workload
recursive = no

[template_production]
frequently = 0
hourly = 0
daily = 0
monthly = 0
yearly = 0
autosnap = no
autoprune = yes

[template_workload]
frequently = 4
hourly = 0
daily = 0
monthly = 0
yearly = 0
autosnap = yes
autoprune = yes
