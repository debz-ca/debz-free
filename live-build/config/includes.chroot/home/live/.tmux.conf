set -g mouse on
setw -g mode-keys vi
set -g history-limit 100000
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Splits
unbind '"'
unbind %
bind | split-window -h
bind - split-window -v

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Reloaded!"

# Vi copy mode
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel

# ── Theme — matches debz website color schema ─────────────────────────────────
# --bg #0f1117  --surface #161b25  --accent #34d399  --accent2 #60a5fa
# --muted #64748b  --text #e2e8f0

set -g status-style                 "bg=#161b25 fg=#e2e8f0"
set -g status-left-length           40
set -g status-right-length          60

set -g status-left  "#[fg=#34d399,bold] debz #[fg=#64748b]· #[fg=#60a5fa]ZFS Infrastructure Platform #[fg=#161b25] "
set -g status-right "#[fg=#64748b]%H:%M  #[fg=#34d399,bold]#H"

set -g window-status-format         "#[fg=#64748b] #I:#W "
set -g window-status-current-format "#[fg=#34d399,bold] #I:#W "
set -g window-status-separator      ""

set -g pane-border-style            "fg=#1e2533"
set -g pane-active-border-style     "fg=#34d399"

set -g message-style                "bg=#1e2533 fg=#34d399"
set -g message-command-style        "bg=#1e2533 fg=#60a5fa"

set -g mode-style                   "bg=#34d399 fg=#0f1117"
