name: desktop
description: "GNOME desktop profile with ZFS storage and graphical installer"
packages:
  base:
    - openssh-server
    - sudo
    - curl
    - rsync
  desktop:
    - task-gnome-desktop
    - gdm3
    - gnome-terminal
    - network-manager
    - network-manager-gnome
  zfs:
    - zfsutils-linux
    - zfs-initramfs
    - zfs-zed
    - zfsbootmenu
features:
  - ssh
  - zfs
  - gnome
  - network-manager
datasets:
  extra:
    - path: rpool/home
      mountpoint: /home
      compression: lz4
    - path: rpool/home/snapshots
      mountpoint: none
      compression: lz4
services:
  enable:
    - gdm
    - NetworkManager
    - ssh
    - zfs-zed
    - debz-firstboot
    - debz-srv-snapshot.timer
  disable:
    - bluetooth
