name: server
description: "Headless server profile with ZFS storage and SSH access"
packages:
  base:
    - openssh-server
    - sudo
    - curl
    - rsync
    - chrony
    - nftables
    - htop
    - tmux
    - vim-tiny
  zfs:
    - zfsutils-linux
    - zfs-initramfs
    - zfs-zed
    - zfsbootmenu
features:
  - ssh
  - zfs
  - nftables
  - chrony
datasets:
  extra:
    - path: rpool/srv/data
      mountpoint: /srv/data
      compression: lz4
services:
  enable:
    - ssh
    - chrony
    - zfs-zed
    - debz-firstboot
    - debz-srv-snapshot.timer
  disable:
    - bluetooth
