name: intunenix-server
description: >
  MasterControl management server — Intune-equivalent for Linux fleets.
  Provides device enrollment, profile assignment, compliance reporting,
  and policy push via Salt. GNOME desktop with management Web UI.
  Enroll Linux workstations via WireGuard wg0 + token flow.

# ---------------------------------------------------------------------------
# TODO: Integration status
# ---------------------------------------------------------------------------
# DONE (from intunenix.sh):
#   - MasterControl FastAPI server skeleton
#   - PostgreSQL schema (devices, profiles, enroll_tokens, org_settings)
#   - Nginx reverse proxy with HTTPS
#   - GNOME desktop, kiosk/operator user
#   - First-boot hooks system (/opt/intunenix/firstboot.d/)
#   - Enrollment token API (/enroll endpoint)
#
# TODO — pre-golden-image:
#   [1] Replace nginx client-cert agent auth with WireGuard peer identity
#       wg0: MasterControl always at 10.78.0.1 — no cert dance needed
#   [2] Wire Salt master into MasterControl UI
#       Salt already runs on debz master nodes — MC becomes the highstate UI
#   [3] Build the agent (see build/intunenix/agent.sh skeleton)
#   [4] Add compliance rules engine to MasterControl API
#   [5] Add AD/LDAP bind (stubs already in intunenix.sh)
#   [6] Golden image build: debz golden build intunenix-server
# ---------------------------------------------------------------------------

packages:
  base:
    - openssh-server
    - sudo
    - curl
    - rsync
    - chrony
    - nftables
    - htop
    - tmux
    - vim
  desktop:
    - task-gnome-desktop
    - gdm3
    - firefox-esr
  server_stack:
    # MasterControl API
    - python3
    - python3-pip
    - python3-venv
    - python3-aiohttp
    - uvicorn
    # Database
    - postgresql
    - python3-psycopg2
    # Web proxy
    - nginx
    # Cert management
    - openssl
    # Salt (config management / policy push)
    - salt-master
    - salt-minion
  zfs:
    - zfsutils-linux
    - zfs-initramfs
    - zfs-zed

features:
  - ssh
  - zfs
  - nftables
  - gnome
  - salt-master
  - mastercontrol-api

datasets:
  extra:
    - path: rpool/srv/mastercontrol
      mountpoint: /srv/mastercontrol
      compression: lz4
      # Holds PostgreSQL data, enrollment certs, agent payloads
    - path: rpool/srv/mastercontrol/db
      mountpoint: /srv/mastercontrol/db
      compression: lz4
    - path: rpool/srv/mastercontrol/payloads
      mountpoint: /srv/mastercontrol/payloads
      compression: zstd

services:
  enable:
    - ssh
    - chrony
    - gdm
    - postgresql
    - nginx
    - mastercontrol-api
    - salt-master
    - debz-firstboot
  disable:
    - bluetooth
